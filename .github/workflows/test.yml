name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: pip install pytest pyyaml
      - name: Validate plugin.yaml
        run: python -c "import tomllib, yaml; v=tomllib.load(open('pyproject.toml','rb'))['project']['version']; d=yaml.safe_load(open('plugin.yaml')); assert d['name']=='mempalace-dreaming', d; assert str(d['version'])==v, (d['version'], v); assert d['hooks']==[], d; print('plugin.yaml ok')"
      - name: Validate skill frontmatter
        run: python -c "import tomllib, yaml; v=tomllib.load(open('pyproject.toml','rb'))['project']['version']; t=open('skills/mempalace-dreaming/SKILL.md').read(); assert t.startswith('---'); fm=yaml.safe_load(t[3:t.find(chr(10)+'---'+chr(10),3)]); assert fm['name']=='mempalace-dreaming', fm; assert str(fm['version'])==v, (fm['version'], v); print('skill frontmatter ok')"
      - name: Import smoke
        run: python -c "import mempalace_dreaming.engine as e, mempalace_dreaming.setup as s; assert hasattr(e,'build_integration_report'); assert hasattr(e,'build_lean_check_report'); assert hasattr(s,'build_lean_check_cron_argv'); assert hasattr(s,'LEAN_CHECK_JOB_NAME'); print('import smoke ok')"
      - name: Run tests
        run: python -m pytest tests -q
